# COCO + CC3M mixed training on three GPUs.

data:
  train_json: "data/coco/annotations/captions_train2017.json"
  train_img:  "data/coco/train2017"
  val_json:   "data/coco/annotations/captions_val2017.json"
  val_img:    "data/coco/val2017"
  image_size: 224
  num_workers: 12

  train_datasets:
    - name: "coco"
      json_path: "data/coco/annotations/captions_train2017.json"
      img_dir: "data/coco/train2017"
    - name: "cc3m_wds"
      root: "data/cc3m_wds"
      split: "train"

  # Keep COCO present while letting CC3M dominate the web-scale signal.
  train_mix_weights: [1.0, 3.0]
  train_epoch_size: 240000

model:
  image_encoder_name: "vit_base_patch16_224"
  pretrained: true
  text_encoder_name: "openai/clip-vit-base-patch32"
  embed_dim: 256
  text_max_length: 77
  freeze_text_encoder: true
  freeze_text_projection: false

training:
  epochs: 10
  batch_size: 96
  lr: 3.0e-4
  image_encoder_lr: 1.0e-5
  weight_decay: 0.01
  warmup_steps: 1000
  max_grad_norm: 1.0
  device: "cuda:1"
  gpu_ids: [1, 2, 3]

logging:
  log_interval: 20
  save_dir: "checkpoints/coco_cc3m_3gpu_cliptext"
  resume: ""
